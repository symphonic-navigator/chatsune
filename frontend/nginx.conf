server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Disable nginx version in headers
    server_tokens off;

    # Required for SharedArrayBuffer / multi-threaded WASM in the voice
    # worker. Without these headers, navigator.crossOriginIsolated is
    # false and ORT's WASM backend silently runs on a single thread.
    # COEP=credentialless is more lenient than require-corp — it lets us
    # fetch HuggingFace model files without forcing CORP on every CDN.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # SPA fallback — all routes resolve to index.html so the React router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html — ensures new deploys are picked up on next load.
    # NB: nginx `add_header` does not inherit into a location that declares
    # its own `add_header`, so every isolation header must be repeated here.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Vite emits hashed filenames under /assets/ — safe to cache aggressively.
    # Worker-script chunks also live here; they must carry the isolation
    # headers themselves or Chromium refuses to embed them in the
    # cross-origin-isolated main document.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Basic gzip for text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
