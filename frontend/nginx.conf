server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Disable nginx version in headers
    server_tokens off;

    # SPA fallback — all routes resolve to index.html so the React router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html — ensures new deploys are picked up on next load
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Vite emits hashed filenames under /assets/ — safe to cache aggressively
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Basic gzip for text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
