services:
  mongodb:
    image: mongodb/mongodb-atlas-local:7.0
    ports:
      - "37017:27017"
    volumes:
      - wt_mongodb_data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok"
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - wt_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  wt_mongodb_data:
  wt_redis_data:
